{% extends "layout.html" %}

{% block body %}
    <h1>Create New Ticket</h1>
    <form method="POST" action="/createTicket">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" placeholder="Title" required><br><br>

        <label for="description">Description:</label>
        <textarea id="description" name="description" placeholder="Describe your issue" required></textarea><br><br>

        <label for="priority">Priority:</label>
        <select id="priority" name="priority">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
        </select><br><br>

        <button type="submit">Create Ticket</button>
    </form>
{% endblock %}
