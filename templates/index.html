{% extends "layout.html" %}

{% block body %}

<div class="buttonsContainer">
    <a href="/createTicket">Create New Ticket</a>
    <a href="/logout">Logout</a>
</div>

<table class="tickets">
    <tr>
        <th>Title</th>
        <th>Description</th>
        <th>Status</th>
        <th>Image</th>
        <th>Actions</th>
    </tr>
    {% for ticket in tickets %}
    <tr>
        <td>{{ ticket[2] }}</td>
        <td>{{ ticket[3] }}</td>
        <td>{{ ticket[4] }}</td>
        <td><img src="{{ ticket[7] }}"></td><!--help how do I do this?-->
        <td class="delete">
            <form action="{{ url_for('delete_item') }}" method="POST">
                <input type="hidden" name="delete" value="{{ ticket[0] }}">
                <button class="delete-btn" title="Delete">&#128465;</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
